name: adaptative-living-library
version: 0.2.0
status: onboarding-beta
summary: Privacy-safe Hermes Agent template for an Adaptative Living Library with Scout, Librero, Autonomous, and Relic profiles.
hermes_min_version: unknown
components:
  library_template: library-template
  profiles:
    - adaptative-librero
    - adaptative-scout
    - adaptative-autonomous
    - adaptative-relic
  skills:
    - adaptative-librero
    - adaptative-scout
    - adaptative-autonomous
    - adaptative-relic
  scripts:
    - scripts/install_pack.py
    - scripts/onboard.py
    - scripts/sanitize_check.py
    - scripts/lint_library.py
    - scripts/library_preflight.py
safety_defaults:
  dry_run_first: true
  onboarding_dry_run_first: true
  create_crons: false
  restart_gateway: false
  change_models_or_providers: false
  write_active_memory: false
  publish_external: false
agent_names:
  scout: Adaptative Scout
  librero: Adaptative Librero
  autonomous: Adaptative Autonomous
  relic: Adaptative Relic
placeholders:
  HERMES_HOME: __HERMES_HOME__
  LIBRARY_NAME: __LIBRARY_NAME__
  OPERATOR_NAME: __OPERATOR_NAME__
